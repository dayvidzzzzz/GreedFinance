server:
  port: 8081

spring:
  datasource:
    url: ${DB_MYSQL_DATASOURCE_URL}
    user: ${DB_MYSQL_USER}
    password: ${DB_MYSQL_PASSWORD}
    port: ${DB_MYSQL_PORT}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}

    jpa:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        ddl-auto: ${JPA_DDL_AUTO:validate}
      show-sql: ${JPA_SHOW_SQL:false}
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect
          format_sql: false
          jdbc:
            batch_size: ${HIBERNATE_BATCH_SIZE:20}

    flyway:
      enabled: ${FLYWAY_ENABLED:true}
      clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
      validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}

jwt:
  expiration: ${JWT_EXPIRATION}
  key: ${JWT_KEY}


